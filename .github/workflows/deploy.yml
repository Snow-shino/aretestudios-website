name: Deploy to DreamHost

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: dreamhost-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy static site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DREAMHOST_SSH_KEY }}" > ~/.ssh/dreamhost_key
          chmod 600 ~/.ssh/dreamhost_key
          ssh-keyscan -H "${{ secrets.DREAMHOST_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy dist to DreamHost
        run: |
          ssh -i ~/.ssh/dreamhost_key -o IdentitiesOnly=yes \
            "${{ secrets.DREAMHOST_USER }}@${{ secrets.DREAMHOST_HOST }}" \
            "mkdir -p \"${{ secrets.DREAMHOST_PATH }}\""
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/dreamhost_key -o IdentitiesOnly=yes" \
            dist/ "${{ secrets.DREAMHOST_USER }}@${{ secrets.DREAMHOST_HOST }}:${{ secrets.DREAMHOST_PATH }}/"
